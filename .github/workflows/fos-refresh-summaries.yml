name: FOS Summary Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: fos-summary-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh summary snapshots
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL_MODE: require
        run: npm run db:refresh-fos-summaries

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "FOS summary refresh failed";
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            const body = [
              "The scheduled FOS summary refresh workflow failed.",
              "",
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              `Triggered by: ${context.eventName}`,
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close failure issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "FOS summary refresh failed";
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            for (const issue of issues.filter((item) => item.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Recovered successfully in ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
            }
